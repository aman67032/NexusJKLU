<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" fill="none">
  <!-- BACKGROUND HALO -->
  <!-- Soft Blueish Circle Halo -->
  <circle cx="85" cy="115" r="58" fill="#8FA0D8" opacity="0.18" />
  
  <!-- Sparks & Doodles -->
  <!-- Left Sparks -->
  <path d="M22,88 L14,92" stroke="#FF8400" stroke-width="2.5" stroke-linecap="round" />
  <path d="M25,108 L16,110" stroke="#8FA0D8" stroke-width="2.5" stroke-linecap="round" />
  <!-- Right Sparks -->
  <path d="M152,48 L158,40" stroke="#8FA0D8" stroke-width="2.2" stroke-linecap="round" />
  <path d="M165,58 L173,56" stroke="#FF8400" stroke-width="2.2" stroke-linecap="round" />

  <!-- STUDENT CHARACTER -->
  <!-- Backpack (Left Shoulder / User's Left) -->
  <path d="M42,155 C34,155 28,168 28,185 C28,198 38,198 42,198 Z" fill="#0B0828" />
  <!-- Backpack Strap -->
  <path d="M52,150 C55,140 65,136 72,152 C74,158 70,185 64,198" fill="none" stroke="#0B0828" stroke-width="5.5" stroke-linecap="round" />

  <!-- Crewneck Sweater Torso -->
  <!-- Outline -->
  <path d="M45,198 C45,145 65,130 100,130 C135,130 155,145 155,198 Z" fill="#FAF5EC" stroke="#0B0828" stroke-width="3" />
  
  <!-- Double collar detail -->
  <path d="M78,130 C78,145 122,145 122,130" fill="none" stroke="#0B0828" stroke-width="3" />
  <path d="M74,130 C74,149 126,149 126,130" fill="none" stroke="#0B0828" stroke-width="1.5" />

  <!-- Neck -->
  <rect x="91" y="110" width="18" height="23" rx="2" fill="#F6D3C1" stroke="#0B0828" stroke-width="3" />
  <!-- Neck Shadow -->
  <path d="M91,120 C100,125 109,120 109,120" stroke="#0B0828" stroke-width="1.5" />

  <!-- Head -->
  <!-- Left Ear -->
  <circle cx="78" cy="88" r="6" fill="#F6D3C1" stroke="#0B0828" stroke-width="3" />
  
  <!-- Face -->
  <rect x="80" y="65" width="40" height="48" rx="16" fill="#F6D3C1" stroke="#0B0828" stroke-width="3" />

  <!-- Hair (High Bun, Dark) -->
  <path d="M78,84 C76,68 82,58 100,58 C118,58 124,68 122,84 C120,74 114,68 100,68 C86,68 80,74 78,84 Z" fill="#0B0828" />
  <!-- Hair Bun -->
  <circle cx="95" cy="46" r="14.5" fill="#0B0828" stroke="#0B0828" stroke-width="3" />
  <!-- Wavy face framing hair strands -->
  <path d="M77,88 Q70,95 73,102" fill="none" stroke="#0B0828" stroke-width="2" stroke-linecap="round" />
  <path d="M123,88 Q128,95 125,102" fill="none" stroke="#0B0828" stroke-width="2" stroke-linecap="round" />

  <!-- Facial Features -->
  <!-- Eyebrows -->
  <path d="M86,76 Q90,74 94,76" fill="none" stroke="#0B0828" stroke-width="2" stroke-linecap="round" />
  <path d="M106,76 Q110,74 114,76" fill="none" stroke="#0B0828" stroke-width="2" stroke-linecap="round" />
  <!-- Eyes -->
  <circle cx="90" cy="82" r="2.2" fill="#0B0828" />
  <circle cx="110" cy="82" r="2.2" fill="#0B0828" />
  <!-- Blushing Cheeks -->
  <circle cx="84" cy="87" r="3.5" fill="#FF8400" opacity="0.2" />
  <circle cx="116" cy="87" r="3.5" fill="#FF8400" opacity="0.2" />
  <!-- Subtle Nose -->
  <path d="M100,85 Q101,87 102,85" stroke="#0B0828" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <!-- Open Smiling Mouth -->
  <path d="M94,90 Q100,101 106,90 Z" fill="#0B0828" />
  <path d="M96,95 Q100,99 104,95 Z" fill="#FF8400" opacity="0.8" />

  <!-- Waving Hand (Raised Right Arm / User's Right) -->
  <!-- Arm Outline & Fill -->
  <path d="M136,155 Q152,130 156,98" fill="none" stroke="#0B0828" stroke-width="18" stroke-linecap="round" />
  <path d="M136,155 Q152,130 156,98" fill="none" stroke="#FAF5EC" stroke-width="13" stroke-linecap="round" />
  <!-- Sleeve Cuff -->
  <circle cx="156" cy="98" r="8" fill="#FAF5EC" stroke="#0B0828" stroke-width="3" />
  <!-- Palm -->
  <circle cx="156" cy="86" r="9.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="2.5" />
  <!-- Wavy Fingers -->
  <rect x="148" y="70" width="3" height="11" rx="1.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="1.5" transform="rotate(-15, 148, 70)" />
  <rect x="154" y="66" width="3" height="13" rx="1.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="1.5" />
  <rect x="160" y="68" width="3" height="12" rx="1.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="1.5" transform="rotate(10, 160, 68)" />
  <rect x="166" y="72" width="3" height="10" rx="1.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="1.5" transform="rotate(20, 166, 72)" />
  <!-- Thumb -->
  <rect x="144" y="80" width="3" height="8" rx="1.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="1.5" transform="rotate(-40, 144, 80)" />
  
  <!-- Wave Motion Lines -->
  <path d="M172,78 Q177,84 172,90" fill="none" stroke="#0B0828" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
  <path d="M177,75 Q183,84 177,93" fill="none" stroke="#0B0828" stroke-width="1" stroke-linecap="round" opacity="0.2" />

  <!-- Holding Orange Book (Left Arm / User's Left) -->
  <!-- Orange Book Stack -->
  <rect x="65" y="132" width="38" height="48" rx="3" fill="#FF8400" stroke="#0B0828" stroke-width="3" transform="rotate(-10, 65, 132)" />
  <line x1="68" y1="134" x2="68" y2="180" stroke="#0B0828" stroke-width="1.5" transform="rotate(-10, 65, 132)" />
  
  <!-- Arm Wrapping Book -->
  <path d="M50,175 Q65,178 80,175" fill="none" stroke="#0B0828" stroke-width="18" stroke-linecap="round" />
  <path d="M50,175 Q65,178 80,175" fill="none" stroke="#FAF5EC" stroke-width="13" stroke-linecap="round" />
  <!-- Hand Clasping Book -->
  <circle cx="82" cy="173" r="7.5" fill="#F6D3C1" stroke="#0B0828" stroke-width="2.5" />
</svg>
